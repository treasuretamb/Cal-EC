<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Responsive viewport — covers notches, Dynamic Island, Android cutouts -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cal - Event Calendar</title>

    <!-- Standard favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- iOS PWA -->
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cal">

    <!-- Android / Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Cal">

    <!-- Theme colours — light and dark -->
    <meta name="theme-color" content="#C28840" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#2D3B4D" media="(prefers-color-scheme: dark)">

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inria Sans', 'sans-serif'],
                    },
                },
            },
        }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        /* ── Base ── */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            /* Fill the full viewport including notch/cutout areas */
            height: 100%;
            height: -webkit-fill-available;
        }

        body {
            font-family: 'Inria Sans', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            overflow-x: hidden;
            min-height: 100vh;
            min-height: -webkit-fill-available;

            /* Respect safe areas on all devices (notch, home bar, punch-hole) */
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }

        #root {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
        }

        /* ── Scrollbars ── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @media (max-width: 768px) {
            * { scrollbar-width: none; -ms-overflow-style: none; }
            *::-webkit-scrollbar { display: none; }
        }

        /* ── Buttons ── */
        button:active { transform: scale(0.96); }

        /* ── Safe-area utility classes ── */
        .pb-safe { padding-bottom: max(2rem, env(safe-area-inset-bottom, 0px)); }
        .pt-safe { padding-top: max(0px, env(safe-area-inset-top, 0px)); }
    </style>

<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "date-fns": "https://esm.sh/date-fns@^4.1.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.48.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-[#F5F1EB] text-slate-900 dark:bg-[#2D3B4D] dark:text-white">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
